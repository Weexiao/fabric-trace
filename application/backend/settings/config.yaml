app:
  name: "fabricTraceServer"
  mode: "dev"
  ip : 127.0.0.1
  port: 9090
  salt: "testsalt"
jwt:
  secret: "testsecret"
  issuer: "fabricTraceServer"
mysql:
  host: "127.0.0.1"
  port: 3337
  user: "root"  
  password : "fabrictrace"
  charset: "utf8mb4"
  db : "fabrictrace"

storage:
  type: "ipfs"               # ipfs | s3 | local (当前用 ipfs)
  max_size_mb: 50             # 单文件最大 50MB
  ipfs:
    api_url: "http://127.0.0.1:5001"  # 本机 IPFS API
    gateway_url: ""          # 可选：对外访问的网关基址
crypto:
  enabled: false
  key_version: "v1"
  key_env: "CRYPTO_KEY"      # 从环境变量读取 32 字节 AES key

compression:
  enabled: true               # 是否启用压缩上链
  algorithm: "gzip"           # 压缩算法: "gzip" | "btae"
  model_path: ""              # BTAE 模型路径（预留，当 algorithm=btae 时生效）

